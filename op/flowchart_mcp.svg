<svg width="1500" height="980" viewBox="0 0 1500 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .box { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2.5; rx: 14; ry: 14; }
      .io { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; rx: 14; ry: 14; }
      .decision { fill: #fef3c7; stroke: #d97706; stroke-width: 2.5; }
      .danger { fill: #fee2e2; stroke: #dc2626; stroke-width: 2.5; rx: 14; ry: 14; }
      .ok { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.5; rx: 14; ry: 14; }
      .label { font: 600 17px Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px Arial, sans-serif; fill: #374151; }
      .yesno { font: 700 14px Arial, sans-serif; fill: #1f2937; }
      .arrow { stroke: #334155; stroke-width: 2.8; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#334155" />
    </marker>
  </defs>

  <text x="750" y="52" text-anchor="middle" class="title">Agentic Research Assistant MCP — Source-Grounded Flow</text>

  <rect class="io" x="580" y="82" width="340" height="64" />
  <text x="750" y="120" text-anchor="middle" class="label">User enters topic in Streamlit</text>

  <rect class="box" x="540" y="180" width="420" height="84" />
  <text x="750" y="214" text-anchor="middle" class="label">App MCP Client</text>
  <text x="750" y="238" text-anchor="middle" class="small">Calls App MCP Server tool: run_research(topic)</text>

  <rect class="box" x="520" y="292" width="460" height="96" />
  <text x="750" y="325" text-anchor="middle" class="label">MCP Search (Serper API)</text>
  <text x="750" y="347" text-anchor="middle" class="label">+ MCP Scraper (newspaper3k)</text>
  <text x="750" y="370" text-anchor="middle" class="small">search_serper() via search_web → scrape_url() via scrape_page</text>

  <polygon class="decision" points="750,420 930,505 750,590 570,505" />
  <text x="750" y="500" text-anchor="middle" class="label">Enough grounded evidence?</text>
  <text x="750" y="522" text-anchor="middle" class="small">(min links + min scraped text)</text>

  <rect class="danger" x="980" y="470" width="390" height="74" />
  <text x="1175" y="502" text-anchor="middle" class="label">Stop run with explicit error</text>
  <text x="1175" y="524" text-anchor="middle" class="small">No prior-knowledge fallback is allowed</text>

  <rect class="ok" x="520" y="624" width="460" height="96" />
  <text x="750" y="656" text-anchor="middle" class="label">Generate source-grounded report</text>
  <text x="750" y="678" text-anchor="middle" class="label">(OpenAI SDK, gpt-4o-mini)</text>
  <text x="750" y="701" text-anchor="middle" class="small">Only retrieved snippets are allowed in prompt</text>

  <rect class="box" x="530" y="748" width="440" height="84" />
  <text x="750" y="781" text-anchor="middle" class="label">Evaluator/Reviewer via MCP + OpenAI SDK</text>
  <text x="750" y="805" text-anchor="middle" class="small">run_evaluator/run_reviewer tools → score/improve loop</text>

  <rect class="box" x="90" y="860" width="360" height="88" />
  <text x="270" y="893" text-anchor="middle" class="label">PDF via MCP (reportlab)</text>
  <text x="270" y="917" text-anchor="middle" class="small">run_pdf tool → outputs/reports/*.pdf</text>

  <rect class="box" x="570" y="856" width="360" height="96" />
  <text x="750" y="893" text-anchor="middle" class="label">PPT via MCP (python-pptx)</text>
  <text x="750" y="915" text-anchor="middle" class="small">run_ppt + chart_agent(OpenAI SDK)</text>
  <text x="750" y="934" text-anchor="middle" class="small">+ fallback charts</text>

  <rect class="io" x="1050" y="860" width="360" height="88" />
  <text x="1230" y="893" text-anchor="middle" class="label">Streamlit output</text>
  <text x="1230" y="917" text-anchor="middle" class="small">logs, clickable sources, metrics, downloads</text>

  <path class="arrow" d="M750 146 L750 180" />
  <path class="arrow" d="M750 264 L750 296" />
  <path class="arrow" d="M750 380 L750 420" />

  <path class="arrow" d="M930 505 L980 505" />
  <text x="955" y="492" class="yesno" text-anchor="middle">No</text>

  <path class="arrow" d="M750 590 L750 628" />
  <text x="770" y="612" class="yesno">Yes</text>

  <path class="arrow" d="M750 714 L750 748" />

  <path class="arrow" d="M750 832 L270 860" />
  <path class="arrow" d="M750 832 L750 860" />
  <path class="arrow" d="M750 832 L1230 860" />
</svg>
